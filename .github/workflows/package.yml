name: Build DEB and RPM packages

on:
  workflow_dispatch:

jobs:
  extract-source-url:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.seturl.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract URL from SPEC or debian/control
        id: seturl
        run: |
          URL=""

          # 1. SPEC-Datei prüfen
          if [ -f netways-plugins-apache_status..spec ]; then
            URL=$(grep -E '^Source0:' netways-plugins-apache_status.spec | awk '{print $2}')
          fi

          # 2. Debian control prüfen, falls SPEC nichts liefert
          if [ -z "$URL" ] && [ -f debian/control ]; then
            URL=$(grep -E '^X-Source:' debian/control | cut -d' ' -f2)
          fi

          # 3. Fallback: Homepage
          if [ -z "$URL" ] && [ -f debian/control ]; then
            URL=$(grep -E '^Homepage:' debian/control | cut -d' ' -f2)
          fi

          if [ -z "$URL" ]; then
            echo "ERROR: Keine Source-URL in SPEC oder debian/control gefunden."
            exit 1
          fi

          echo "Gefundene URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download source
        run: |
          wget "${{ steps.seturl.outputs.url }}" -O source.tar.gz
          mkdir src
          tar -xzf source.tar.gz -C src --strip-components=1

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: src

