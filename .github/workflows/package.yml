name: Build RPM

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:  # hier kannst du dann manuell triggern!

jobs:
  expand-matrix:
    runs-on: ubuntu-latest

    env:
      MATRIX: |
        el9: x86_64
        fedora44: [x86_64, aarch64]

    steps:
      - name: Expand matrix
        id: expand
        uses: ./.github/actions/expand-matrix
        with:
          matrix: |
            el9: x86_64
            fedora44: [x86_64]

    outputs:
      matrix: ${{ steps.expand.outputs.matrix }}

  build:
    needs: expand-matrix
    uses: lbetz/ci-workflows/.github/workflows/rpm-build.yml@rework
    with:
      matrix: ${{ needs.expand-matrix.outputs.matrix }}
