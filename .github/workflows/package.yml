name: Build packages

on:
  push:
    branches: [ '**' ]
    tags:
      - '*'

jobs:
  build:
    uses: lbetz/ci-workflows/.github/workflows/package.yml@main
    with:
      ci_workflows_ref: "main"
      runner_labels: '["self-hosted2","homelab2"]'
      matrix: |
        el9: x86_64
        debian12: x86_64
        ubuntu24: x86_64
    secrets: inherit
