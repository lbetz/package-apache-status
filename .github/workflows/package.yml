  build-rpm:
    needs: extract-source-url
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Install RPM build tools
        run: |
          dnf install -y rpm-build make gcc git

      - name: Prepare RPM build structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp packaging/yourproject.spec ~/rpmbuild/SPECS/
          tar czf ~/rpmbuild/SOURCES/myproject.tar.gz src

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/yourproject.spec
          mkdir -p artifacts/rpm
          cp ~/rpmbuild/RPMS/*/*.rpm artifacts/rpm/

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: artifacts/rpm

