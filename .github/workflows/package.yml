name: Build & Test RPM Matrix

on:
  workflow_dispatch:

#on:
#  push:
#    branches: [ main ]
#  workflow_dispatch:

jobs:
  build-test-rpm:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro: [fedora:38, fedora:39, fedora:40, almalinux:8, almalinux:9]
        arch: [x86_64, aarch64]

    container:
      image: ${{ matrix.distro }}

    steps:
      - name: Install required tools
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y git wget rpm-build rpmdevtools findutils gcc make
          else
            yum install -y git wget rpm-build rpmdevtools findutils gcc make
          fi

      - name: Checkout repository inside container
        uses: actions/checkout@v4

      - name: Find SPEC file
        id: spec
        run: |
          SPEC=$(find ./ -name "*.spec" | head -n 1)
          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Extract Source0 URL + filename
        id: url
        run: |
          URL=$(grep -E '^Source0:' "${{ steps.spec.outputs.spec }}" | awk '{print $2}')
          FILENAME=$(basename "$URL")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Download source tarball
        run: |
          wget "${{ steps.url.outputs.url }}" -O "${{ steps.url.outputs.filename }}"
          mkdir src
          tar -xzf "${{ steps.url.outputs.filename }}" -C src --strip-components=1

      - name: Prepare rpmbuild structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp "${{ steps.spec.outputs.spec }}" ~/rpmbuild/SPECS/
          cp "${{ steps.url.outputs.filename }}" ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/$(basename "${{ steps.spec.outputs.spec }}")
          mkdir -p artifacts/rpm
          cp ~/rpmbuild/RPMS/*/*.rpm artifacts/rpm/

      - name: Install built RPM
        run: |
          RPM=$(ls artifacts/rpm/*.rpm | head -n 1)
          echo "Installing $RPM"
          if command -v dnf >/dev/null; then
            dnf install -y "$RPM"
          else
            yum install -y "$RPM"
          fi

      - name: Uninstall RPM
        run: |
          if command -v dnf >/dev/null; then
            dnf remove -y netways-plugins-apache_status || true
          else
            yum remove -y netways-plugins-apache_status || true
          fi

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.distro }}-${{ matrix.arch }}
          path: artifacts/rpm

