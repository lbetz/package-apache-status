name: Build RPM package

on:
  workflow_dispatch:

#on:
#  push:
#    branches:
#      - main
#  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install required tools inside container
        run: |
          dnf install -y git wget rpm-build make gcc

      - name: Checkout repository inside container
        uses: actions/checkout@v4

      - name: Find SPEC file
        id: spec
        run: |
          SPEC=$(find ./ -name "netways-plugins-apache_status.spec" | head -n 1)

          if [ -z "$SPEC" ]; then
            echo "ERROR: SPEC-Datei nicht gefunden."
            exit 1
          fi

          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Extract Source0 URL + filename from SPEC
        id: url
        run: |
          SPEC="${{ steps.spec.outputs.spec }}"

          URL=$(grep -E '^Source0:' "$SPEC" | awk '{print $2}')
          if [ -z "$URL" ]; then
            echo "ERROR: Keine Source0-URL in SPEC gefunden."
            exit 1
          fi

          FILENAME=$(basename "$URL")

          echo "Gefundene URL: $URL"
          echo "Gefundener Dateiname: $FILENAME"

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Download source tarball
        run: |
          wget "${{ steps.url.outputs.url }}" -O "${{ steps.url.outputs.filename }}"
          mkdir src
          tar -xzf "${{ steps.url.outputs.filename }}" -C src --strip-components=1

      - name: Prepare rpmbuild structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # SPEC kopieren
          cp "${{ steps.spec.outputs.spec }}" ~/rpmbuild/SPECS/

          # Tarball exakt so benennen, wie SPEC es erwartet
          cp "${{ steps.url.outputs.filename }}" ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/$(basename "${{ steps.spec.outputs.spec }}")
          mkdir -p artifacts/rpm
          cp ~/rpmbuild/RPMS/*/*.rpm artifacts/rpm/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: artifacts/rpm

