name: Build DEB and RPM packages

on:
  workflow_dispatch:

jobs:
  extract-and-download:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Source URL from SPEC
        id: url
        run: |
          SPEC="packaging/netways-plugins-apache_status.spec"

          if [ ! -f "$SPEC" ]; then
            echo "ERROR: SPEC-Datei nicht gefunden: $SPEC"
            exit 1
          fi

          # Source0 aus SPEC extrahieren
          URL=$(grep -E '^Source0:' "$SPEC" | awk '{print $2}')

          if [ -z "$URL" ]; then
            echo "ERROR: Keine Source0-URL in SPEC gefunden."
            exit 1
          fi

          echo "Gefundene URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download source tarball
        run: |
          wget "${{ steps.url.outputs.url }}" -O source.tar.gz
          mkdir src
          tar -xzf source.tar.gz -C src --strip-components=1

      - name: Upload extracted source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: src

  build-rpm:
    needs: extract-and-download
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Install RPM build tools
        run: |
          dnf install -y rpm-build make gcc git

      - name: Prepare rpmbuild structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # SPEC kopieren
          cp packaging/netways-plugins-apache_status.spec ~/rpmbuild/SPECS/

          # Source tarball erzeugen
          tar czf ~/rpmbuild/SOURCES/netways-plugins-apache_status.tar.gz src

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/netways-plugins-apache_status.spec
          mkdir -p artifacts/rpm
          cp ~/rpmbuild/RPMS/*/*.rpm artifacts/rpm/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: artifacts/rpm

