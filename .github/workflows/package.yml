name: Build DEB and RPM packages

on:
  workflow_dispatch:

name: Build RPM package

#on:
#  push:
#    branches:
#      - main
#  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install git inside container
        run: dnf install -y git

      - name: Checkout repository inside container
        uses: actions/checkout@v4

      - name: Find SPEC file
        id: spec
        run: |
          SPEC=$(find packaging -name "*.spec" | head -n 1)

          if [ -z "$SPEC" ]; then
            echo "ERROR: Keine SPEC-Datei in packaging/ gefunden."
            exit 1
          fi

          echo "Gefundene SPEC: $SPEC"
          echo "spec=$SPEC" >> $GITHUB_OUTPUT

      - name: Extract Source0 URL from SPEC
        id: url
        run: |
          URL=$(grep -E '^Source0:' "${{ steps.spec.outputs.spec }}" | awk '{print $2}')

          if [ -z "$URL" ]; then
            echo "ERROR: Keine Source0-URL in SPEC gefunden."
            exit 1
          fi

          echo "Gefundene URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download source tarball
        run: |
          wget "${{ steps.url.outputs.url }}" -O source.tar.gz
          mkdir src
          tar -xzf source.tar.gz -C src --strip-components=1

      - name: Install RPM build tools
        run: |
          dnf install -y rpm-build make gcc

      - name: Prepare rpmbuild structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # SPEC kopieren
          cp "${{ steps.spec.outputs.spec }}" ~/rpmbuild/SPECS/

          # Source tarball erzeugen
          tar czf ~/rpmbuild/SOURCES/netways-plugins-apache_status.tar.gz src

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/$(basename "${{ steps.spec.outputs.spec }}")
          mkdir -p artifacts/rpm
          cp ~/rpmbuild/RPMS/*/*.rpm artifacts/rpm/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: artifacts/rpm

